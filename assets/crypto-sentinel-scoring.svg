<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f1628"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4e7fff"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4aa"/>
    </marker>
  </defs>

  <rect width="860" height="460" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#e8edf8" font-size="18" font-weight="700">⚙️  Scoring Engine — How Each Coin Gets Ranked</text>
  <line x1="80" y1="48" x2="780" y2="48" stroke="#2a3660" stroke-width="1"/>

  <!-- INPUT label -->
  <text x="75" y="80" fill="#8b9cc8" font-size="11" font-weight="600" letter-spacing="1">INPUTS</text>

  <!-- 6 signal boxes -->
  <!-- Sentiment -->
  <rect x="20" y="90" width="140" height="62" rx="8" fill="#1a2340" stroke="#4e7fff" stroke-width="1.5"/>
  <text x="90" y="110" text-anchor="middle" fill="#4e7fff" font-size="11" font-weight="700">News Sentiment</text>
  <text x="90" y="127" text-anchor="middle" fill="#8b9cc8" font-size="9">Bullish / Bearish ratio</text>
  <text x="90" y="142" text-anchor="middle" fill="#e8edf8" font-size="12" font-weight="800">30%</text>

  <!-- 7d Momentum -->
  <rect x="20" y="165" width="140" height="62" rx="8" fill="#1a2340" stroke="#4e7fff" stroke-width="1.5"/>
  <text x="90" y="185" text-anchor="middle" fill="#4e7fff" font-size="11" font-weight="700">7-Day Momentum</text>
  <text x="90" y="202" text-anchor="middle" fill="#8b9cc8" font-size="9">7d price change %</text>
  <text x="90" y="217" text-anchor="middle" fill="#e8edf8" font-size="12" font-weight="800">25%</text>

  <!-- 30d Momentum -->
  <rect x="20" y="240" width="140" height="62" rx="8" fill="#1a2340" stroke="#4e7fff" stroke-width="1.5"/>
  <text x="90" y="260" text-anchor="middle" fill="#4e7fff" font-size="11" font-weight="700">30-Day Momentum</text>
  <text x="90" y="277" text-anchor="middle" fill="#8b9cc8" font-size="9">30d price change %</text>
  <text x="90" y="292" text-anchor="middle" fill="#e8edf8" font-size="12" font-weight="800">15%</text>

  <!-- 24h Momentum -->
  <rect x="20" y="315" width="140" height="62" rx="8" fill="#1a2340" stroke="#4e7fff" stroke-width="1.5"/>
  <text x="90" y="335" text-anchor="middle" fill="#4e7fff" font-size="11" font-weight="700">24h Momentum</text>
  <text x="90" y="352" text-anchor="middle" fill="#8b9cc8" font-size="9">24h price change %</text>
  <text x="90" y="367" text-anchor="middle" fill="#e8edf8" font-size="12" font-weight="800">15%</text>

  <!-- Volume Ratio -->
  <rect x="20" y="390" width="140" height="42" rx="8" fill="#1a2340" stroke="#4e7fff" stroke-width="1.5"/>
  <text x="90" y="408" text-anchor="middle" fill="#4e7fff" font-size="11" font-weight="700">Volume Ratio</text>
  <text x="90" y="422" text-anchor="middle" fill="#e8edf8" font-size="12" font-weight="800">10%  +  Trending 5%</text>

  <!-- Arrows to normalizer -->
  <line x1="162" y1="121" x2="248" y2="200" stroke="#4e7fff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="162" y1="196" x2="248" y2="220" stroke="#4e7fff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="162" y1="271" x2="248" y2="245" stroke="#4e7fff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="162" y1="346" x2="248" y2="268" stroke="#4e7fff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="162" y1="411" x2="248" y2="290" stroke="#4e7fff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- NORMALIZER box -->
  <rect x="250" y="150" width="160" height="180" rx="10" fill="#0f1e3a" stroke="#2a4a7f" stroke-width="2"/>
  <text x="330" y="175" text-anchor="middle" fill="#5ba3f5" font-size="11" font-weight="700">NORMALIZER</text>
  <line x1="265" y1="182" x2="395" y2="182" stroke="#2a4a7f" stroke-width="1"/>
  <text x="330" y="200" text-anchor="middle" fill="#8b9cc8" font-size="9">Sentiment: −1→+1</text>
  <text x="330" y="215" text-anchor="middle" fill="#8b9cc8" font-size="9">→ normalized 0–100</text>
  <text x="330" y="235" text-anchor="middle" fill="#8b9cc8" font-size="9">% change: clamped</text>
  <text x="330" y="250" text-anchor="middle" fill="#8b9cc8" font-size="9">at ±50%, scaled 0–100</text>
  <text x="330" y="270" text-anchor="middle" fill="#8b9cc8" font-size="9">Volume: log-scale</text>
  <text x="330" y="285" text-anchor="middle" fill="#8b9cc8" font-size="9">0.02–0.20 ratio → 0–100</text>
  <text x="330" y="305" text-anchor="middle" fill="#8b9cc8" font-size="9">Trending: 80 · Non: 30</text>

  <!-- Arrow normalizer to composer -->
  <line x1="412" y1="240" x2="468" y2="240" stroke="#4e7fff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- WEIGHTED COMPOSER -->
  <rect x="470" y="150" width="170" height="180" rx="10" fill="#0f1e3a" stroke="#2a4a7f" stroke-width="2"/>
  <text x="555" y="175" text-anchor="middle" fill="#5ba3f5" font-size="11" font-weight="700">WEIGHTED SUM</text>
  <line x1="485" y1="182" x2="625" y2="182" stroke="#2a4a7f" stroke-width="1"/>
  <text x="555" y="200" text-anchor="middle" fill="#8b9cc8" font-size="9">score =</text>
  <text x="555" y="215" text-anchor="middle" fill="#00d4aa" font-size="9">sent × 0.30</text>
  <text x="555" y="228" text-anchor="middle" fill="#00d4aa" font-size="9">+ mom7d × 0.25</text>
  <text x="555" y="241" text-anchor="middle" fill="#00d4aa" font-size="9">+ mom30d × 0.15</text>
  <text x="555" y="254" text-anchor="middle" fill="#00d4aa" font-size="9">+ mom24h × 0.15</text>
  <text x="555" y="267" text-anchor="middle" fill="#00d4aa" font-size="9">+ volume × 0.10</text>
  <text x="555" y="280" text-anchor="middle" fill="#00d4aa" font-size="9">+ trending × 0.05</text>
  <text x="555" y="300" text-anchor="middle" fill="#556090" font-size="9">= composite 0–100</text>
  <text x="555" y="318" text-anchor="middle" fill="#556090" font-size="9">Weights sum = 1.0 ✓</text>

  <!-- Arrow to signal -->
  <line x1="642" y1="240" x2="698" y2="240" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- SIGNAL OUTPUT -->
  <rect x="700" y="115" width="145" height="260" rx="10" fill="#0f1e3a" stroke="#2a4a7f" stroke-width="2"/>
  <text x="772" y="138" text-anchor="middle" fill="#5ba3f5" font-size="11" font-weight="700">SIGNAL</text>
  <line x1="715" y1="145" x2="830" y2="145" stroke="#2a4a7f" stroke-width="1"/>

  <!-- BUY -->
  <rect x="715" y="155" width="115" height="55" rx="7" fill="#0d2a20" stroke="#00d4aa" stroke-width="2"/>
  <text x="772" y="175" text-anchor="middle" fill="#00d4aa" font-size="15" font-weight="800">BUY</text>
  <text x="772" y="193" text-anchor="middle" fill="#00d4aa" font-size="10">Score ≥ 65</text>
  <text x="772" y="206" text-anchor="middle" fill="#556090" font-size="9">Strong signal</text>

  <!-- WATCH -->
  <rect x="715" y="220" width="115" height="55" rx="7" fill="#2a1f00" stroke="#f0a500" stroke-width="2"/>
  <text x="772" y="240" text-anchor="middle" fill="#f0a500" font-size="15" font-weight="800">WATCH</text>
  <text x="772" y="258" text-anchor="middle" fill="#f0a500" font-size="10">Score 45–64</text>
  <text x="772" y="271" text-anchor="middle" fill="#556090" font-size="9">Monitor closely</text>

  <!-- AVOID -->
  <rect x="715" y="285" width="115" height="55" rx="7" fill="#2a0d0d" stroke="#e63946" stroke-width="2"/>
  <text x="772" y="305" text-anchor="middle" fill="#e63946" font-size="15" font-weight="800">AVOID</text>
  <text x="772" y="323" text-anchor="middle" fill="#e63946" font-size="10">Score &lt; 45</text>
  <text x="772" y="336" text-anchor="middle" fill="#556090" font-size="9">Bearish signals</text>

  <!-- Confidence -->
  <rect x="715" y="350" width="115" height="15" rx="4" fill="#1a2340" stroke="#2a3660" stroke-width="1"/>
  <text x="772" y="361" text-anchor="middle" fill="#8b9cc8" font-size="8">HIGH · MEDIUM · LOW confidence</text>

  <!-- Example result bottom -->
  <rect x="170" y="415" width="530" height="32" rx="8" fill="#0d1f0d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="230" y="430" fill="#556090" font-size="10">Example output →</text>
  <text x="310" y="430" fill="#00d4aa" font-size="10" font-weight="700">SOL: 71.7</text>
  <text x="370" y="430" fill="#00d4aa" font-size="10">BUY · HIGH · +9.1% 7d · Sentiment: 80/100</text>
  <text x="630" y="430" fill="#556090" font-size="10">144 tests ✓</text>
</svg>
