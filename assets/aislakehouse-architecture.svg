<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="ais-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f1628"/>
    </linearGradient>
    <linearGradient id="ais-azureGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2440"/>
    </linearGradient>
    <linearGradient id="ais-cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2340"/>
      <stop offset="100%" style="stop-color:#141c35"/>
    </linearGradient>
    <linearGradient id="ais-bronzeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a4a1e"/>
      <stop offset="100%" style="stop-color:#5a3414"/>
    </linearGradient>
    <linearGradient id="ais-silverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a6b85"/>
      <stop offset="100%" style="stop-color:#3e4c63"/>
    </linearGradient>
    <linearGradient id="ais-goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c79a2e"/>
      <stop offset="100%" style="stop-color:#9a7415"/>
    </linearGradient>
    <filter id="ais-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="ais-arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4e7fff"/>
    </marker>
    <marker id="ais-arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4aa"/>
    </marker>
    <marker id="ais-arrowGold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0a500"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="url(#ais-bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e8edf8" font-size="20" font-weight="700" letter-spacing="-0.5">🛰️ AISLakehouse — Real-Time Maritime Lakehouse</text>
  <line x1="90" y1="50" x2="810" y2="50" stroke="#2a3660" stroke-width="1"/>

  <!-- ═══ DATA SOURCE (left) ═══ -->
  <text x="30" y="86" fill="#8b9cc8" font-size="11" font-weight="600" letter-spacing="1">LIVE FEED</text>

  <!-- AISStream WebSocket -->
  <rect x="22" y="98" width="180" height="92" rx="10" fill="url(#ais-cardGrad)" stroke="#2a3660" stroke-width="1.5" filter="url(#ais-shadow)"/>
  <text x="44" y="122" fill="#00d4aa" font-size="18">📡</text>
  <text x="70" y="125" fill="#e8edf8" font-size="13" font-weight="700">AISStream.io</text>
  <text x="32" y="145" fill="#8b9cc8" font-size="10">WebSocket push feed</text>
  <text x="32" y="160" fill="#8b9cc8" font-size="10">PositionReport · ShipStatic</text>
  <text x="32" y="175" fill="#00d4aa" font-size="9">Global ship transponders ✓</text>

  <!-- 4 regions -->
  <rect x="22" y="208" width="180" height="92" rx="10" fill="url(#ais-cardGrad)" stroke="#2a3660" stroke-width="1.5" filter="url(#ais-shadow)"/>
  <text x="44" y="232" fill="#f0a500" font-size="16">🌍</text>
  <text x="70" y="235" fill="#e8edf8" font-size="12" font-weight="700">4 Bounding Boxes</text>
  <text x="32" y="255" fill="#8b9cc8" font-size="10">Singapore · Rotterdam</text>
  <text x="32" y="270" fill="#8b9cc8" font-size="10">Houston · Str. of Hormuz</text>
  <text x="32" y="288" fill="#556090" font-size="9">MMSI partition key</text>

  <!-- Arrow source -> consumer -->
  <line x1="204" y1="150" x2="248" y2="150" stroke="#4e7fff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ais-arrowBlue)"/>

  <!-- ═══ PIPELINE (center) ═══ -->
  <rect x="250" y="62" width="400" height="430" rx="14" fill="url(#ais-azureGrad)" stroke="#1e5fa8" stroke-width="2" filter="url(#ais-shadow)"/>
  <text x="450" y="86" text-anchor="middle" fill="#5ba3f5" font-size="12" font-weight="700" letter-spacing="0.6">☁️  AZURE  +  DATABRICKS  (Structured Streaming)</text>
  <line x1="270" y1="94" x2="630" y2="94" stroke="#1e5fa8" stroke-width="1"/>

  <!-- Container Apps consumer -->
  <rect x="270" y="106" width="360" height="56" rx="8" fill="#0f1e3a" stroke="#2a4a7f" stroke-width="1.5"/>
  <text x="450" y="125" text-anchor="middle" fill="#5ba3f5" font-size="11" font-weight="700">CONTAINER APPS — 24/7 PYTHON CONSUMER</text>
  <text x="450" y="142" text-anchor="middle" fill="#8b9cc8" font-size="9.5">asyncio · reconnect w/ backoff + jitter · idle heartbeat</text>
  <text x="450" y="156" text-anchor="middle" fill="#556090" font-size="9">attaches ingest_ts · publishes raw JSON</text>

  <!-- Event Hubs -->
  <rect x="270" y="178" width="360" height="50" rx="8" fill="#0f1e3a" stroke="#2a4a7f" stroke-width="1.5"/>
  <text x="296" y="199" fill="#f0a500" font-size="14">⚡</text>
  <text x="316" y="200" fill="#e8edf8" font-size="11" font-weight="700">Event Hubs</text>
  <text x="316" y="216" fill="#8b9cc8" font-size="9.5">Kafka endpoint · Standard tier · durable replayable buffer</text>
  <text x="600" y="200" text-anchor="end" fill="#00d4aa" font-size="9">at-least-once</text>

  <!-- Medallion label -->
  <text x="450" y="252" text-anchor="middle" fill="#5ba3f5" font-size="11" font-weight="700" letter-spacing="0.5">MEDALLION LAKEHOUSE — Delta on ADLS Gen2</text>

  <!-- Bronze -->
  <rect x="270" y="262" width="360" height="58" rx="8" fill="url(#ais-bronzeGrad)" stroke="#9a6628" stroke-width="1.2"/>
  <text x="284" y="283" fill="#ffd9a8" font-size="11" font-weight="700">🥉 BRONZE</text>
  <text x="284" y="300" fill="#f0dcc0" font-size="9.5">Raw &amp; immutable · exactly-once via checkpoint + Delta</text>
  <text x="284" y="314" fill="#d8b896" font-size="9">replay / audit anchor — no parsing</text>
  <text x="616" y="294" text-anchor="end" fill="#ffe8c8" font-size="10" font-weight="700">300K rows</text>

  <!-- Silver -->
  <rect x="270" y="328" width="360" height="58" rx="8" fill="url(#ais-silverGrad)" stroke="#7d8da8" stroke-width="1.2"/>
  <text x="284" y="349" fill="#eef2fa" font-size="11" font-weight="700">🥈 SILVER</text>
  <text x="284" y="366" fill="#e2e8f5" font-size="9.5">Parse · watermark + dedup (MMSI, event_time) · MMSI→flag</text>
  <text x="284" y="380" fill="#c4cde0" font-size="9">destination normalize · DQ quarantine (~0.3%)</text>
  <text x="616" y="360" text-anchor="end" fill="#eef2fa" font-size="10" font-weight="700">254K rows</text>

  <!-- Gold -->
  <rect x="270" y="394" width="360" height="64" rx="8" fill="url(#ais-goldGrad)" stroke="#caa033" stroke-width="1.2"/>
  <text x="284" y="415" fill="#3a2c08" font-size="11" font-weight="700">🥇 GOLD — vessel-behavior analytics</text>
  <text x="284" y="432" fill="#4a3a10" font-size="9.5" font-weight="600">Dark-vessel detection (reporting-gap + confidence)</text>
  <text x="284" y="446" fill="#4a3a10" font-size="9.5" font-weight="600">Tanker flow + floating-storage commodity indicator</text>

  <!-- internal arrows -->
  <line x1="450" y1="163" x2="450" y2="176" stroke="#4e7fff" stroke-width="1.5" marker-end="url(#ais-arrowBlue)"/>
  <line x1="450" y1="229" x2="450" y2="260" stroke="#4e7fff" stroke-width="1.5" marker-end="url(#ais-arrowBlue)"/>
  <line x1="450" y1="321" x2="450" y2="326" stroke="#e8edf8" stroke-width="1.5" marker-end="url(#ais-arrowGreen)"/>
  <line x1="450" y1="387" x2="450" y2="392" stroke="#f0a500" stroke-width="1.5" marker-end="url(#ais-arrowGold)"/>

  <!-- ═══ SERVING (right) ═══ -->
  <text x="668" y="86" fill="#8b9cc8" font-size="11" font-weight="600" letter-spacing="1">SERVING</text>

  <!-- export metrics -->
  <rect x="668" y="98" width="208" height="78" rx="10" fill="url(#ais-cardGrad)" stroke="#2a3660" stroke-width="1.5" filter="url(#ais-shadow)"/>
  <text x="690" y="120" fill="#5ba3f5" font-size="16">📊</text>
  <text x="714" y="123" fill="#e8edf8" font-size="12.5" font-weight="700">export_metrics</text>
  <text x="678" y="143" fill="#8b9cc8" font-size="10">All-layer metrics → JSON</text>
  <text x="678" y="158" fill="#8b9cc8" font-size="10">flags · dark events · freshness</text>
  <text x="678" y="172" fill="#00d4aa" font-size="9">countDistinct vessels ✓</text>

  <!-- Vercel dashboard -->
  <rect x="668" y="186" width="208" height="86" rx="10" fill="url(#ais-cardGrad)" stroke="#2a3660" stroke-width="1.5" filter="url(#ais-shadow)"/>
  <text x="690" y="208" fill="#ffffff" font-size="17">▲</text>
  <text x="714" y="211" fill="#e8edf8" font-size="12.5" font-weight="700">Vercel Dashboard</text>
  <text x="678" y="231" fill="#8b9cc8" font-size="10">Live public URL · glassmorphism</text>
  <text x="678" y="246" fill="#8b9cc8" font-size="10">interactive KPIs · sortable tables</text>
  <text x="678" y="262" fill="#00d4aa" font-size="9">aislakehouse.vercel.app ✓</text>

  <!-- GitHub Action -->
  <rect x="668" y="282" width="208" height="78" rx="10" fill="url(#ais-cardGrad)" stroke="#2a3660" stroke-width="1.5" filter="url(#ais-shadow)"/>
  <text x="690" y="304" fill="#f0a500" font-size="16">⏰</text>
  <text x="714" y="307" fill="#e8edf8" font-size="12.5" font-weight="700">GitHub Action</text>
  <text x="678" y="327" fill="#8b9cc8" font-size="10">Hourly cron · pipeline orchestrator</text>
  <text x="678" y="342" fill="#8b9cc8" font-size="10">rebuild → redeploy</text>
  <text x="678" y="356" fill="#556090" font-size="9">ruff + pytest · 86 tests</text>

  <!-- arrows pipeline -> serving -->
  <line x1="652" y1="420" x2="664" y2="150" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ais-arrowGold)"/>
  <line x1="766" y1="176" x2="766" y2="184" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#ais-arrowGreen)"/>
  <line x1="766" y1="360" x2="766" y2="368" stroke="#f0a500" stroke-width="1.5"/>
  <path d="M 720 360 Q 720 380 740 380 L 800 380 Q 820 380 820 360 L 820 280" fill="none" stroke="#f0a500" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#ais-arrowGold)"/>

  <!-- Bottom legend -->
  <line x1="22" y1="508" x2="878" y2="508" stroke="#2a3660" stroke-width="1"/>
  <rect x="40" y="520" width="12" height="12" rx="3" fill="url(#ais-bronzeGrad)"/>
  <text x="58" y="530" fill="#8b9cc8" font-size="10">Bronze raw</text>
  <rect x="140" y="520" width="12" height="12" rx="3" fill="url(#ais-silverGrad)"/>
  <text x="158" y="530" fill="#8b9cc8" font-size="10">Silver clean</text>
  <rect x="245" y="520" width="12" height="12" rx="3" fill="url(#ais-goldGrad)"/>
  <text x="263" y="530" fill="#8b9cc8" font-size="10">Gold analytics</text>
  <line x1="370" y1="526" x2="400" y2="526" stroke="#4e7fff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="408" y="530" fill="#8b9cc8" font-size="10">Stream flow</text>
  <text x="858" y="530" text-anchor="end" fill="#556090" font-size="10">Exactly-once into Bronze · tear down between sessions</text>
</svg>
